AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Kamel admin API stack

Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, prod]

  DatabaseName:
    Type: String
    Default: kamel

  DatabaseEndpoint:
    Type: String
    Default: ""

  DatabaseSecretArn:
    Type: String
    Default: ""

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 15
    MemorySize: 256
    Architectures:
      - x86_64
    Tracing: Active
    CodeUri: ../../
    Handler: main.handler
    VpcConfig:
      SecurityGroupIds:
        - Fn::ImportValue: !Sub KamelLambdaSG-${Environment}
      SubnetIds:
        - Fn::ImportValue: !Sub KamelPrivateSubnet1-${Environment}
        - Fn::ImportValue: !Sub KamelPrivateSubnet2-${Environment}
    Environment:
      Variables:
        APP_ENV: !Ref Environment
        APP_NAME: kamel-admin
        DATABASE_NAME: !Ref DatabaseName
        DATABASE_ENDPOINT: !Ref DatabaseEndpoint
        DATABASE_SECRET_ARN: !Ref DatabaseSecretArn
        USER_POOL_ID:
          Fn::ImportValue: !Sub KamelUserPoolId-${Environment}
        USER_POOL_ARN:
          Fn::ImportValue: !Sub KamelUserPoolArn-${Environment}
        JWT_ISSUER:
          Fn::ImportValue: !Sub KamelIssuerUrl-${Environment}

Resources:
  AdminApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Environment
      Auth:
        DefaultAuthorizer: SharedJwtAuthorizer
        Authorizers:
          SharedJwtAuthorizer:
            IdentitySource: "$request.header.Authorization"
            JwtConfiguration:
              issuer:
                Fn::ImportValue: !Sub KamelIssuerUrl-${Environment}
              audience:
                - Fn::ImportValue: !Sub KamelAdminAppClientId-${Environment}

  BikesHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub kamel-admin-bikes-${Environment}
      Description: Admin bike master API
      Environment:
        Variables:
          HANDLER_NAME: bikes-handler
          ALLOWED_GROUPS: admin
      Events:
        CreateBike:
          Type: HttpApi
          Properties:
            ApiId: !Ref AdminApi
            Path: /bikes
            Method: POST
        ListBikes:
          Type: HttpApi
          Properties:
            ApiId: !Ref AdminApi
            Path: /bikes
            Method: GET
        GetBike:
          Type: HttpApi
          Properties:
            ApiId: !Ref AdminApi
            Path: /bikes/{bikeId}
            Method: GET
        UpdateBike:
          Type: HttpApi
          Properties:
            ApiId: !Ref AdminApi
            Path: /bikes/{bikeId}
            Method: PATCH
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - apps/kamel-admin/src/main.ts
        Target: es2022
        Sourcemap: true

  UsersHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub kamel-admin-users-${Environment}
      Description: Admin user management API
      Environment:
        Variables:
          HANDLER_NAME: users-handler
          ALLOWED_GROUPS: admin
      Policies:
        - Statement:
            Effect: Allow
            Action:
              - cognito-idp:AdminCreateUser
              - cognito-idp:AdminAddUserToGroup
              - cognito-idp:AdminUpdateUserAttributes
              - cognito-idp:AdminGetUser
              - cognito-idp:ListUsers
            Resource:
              Fn::ImportValue: !Sub KamelUserPoolArn-${Environment}
      Events:
        CreateUser:
          Type: HttpApi
          Properties:
            ApiId: !Ref AdminApi
            Path: /users
            Method: POST
        ListUsers:
          Type: HttpApi
          Properties:
            ApiId: !Ref AdminApi
            Path: /users
            Method: GET
        GetUser:
          Type: HttpApi
          Properties:
            ApiId: !Ref AdminApi
            Path: /users/{userId}
            Method: GET
        UpdateUser:
          Type: HttpApi
          Properties:
            ApiId: !Ref AdminApi
            Path: /users/{userId}
            Method: PATCH
        AssignGroups:
          Type: HttpApi
          Properties:
            ApiId: !Ref AdminApi
            Path: /users/{userId}/groups
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - apps/kamel-admin/src/main.ts
        Target: es2022
        Sourcemap: true

  ProvidersHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub kamel-admin-providers-${Environment}
      Description: Admin provider management API
      Environment:
        Variables:
          HANDLER_NAME: providers-handler
          ALLOWED_GROUPS: admin
      Events:
        CreateProvider:
          Type: HttpApi
          Properties:
            ApiId: !Ref AdminApi
            Path: /fleet-providers
            Method: POST
        ListProviders:
          Type: HttpApi
          Properties:
            ApiId: !Ref AdminApi
            Path: /fleet-providers
            Method: GET
        GetProvider:
          Type: HttpApi
          Properties:
            ApiId: !Ref AdminApi
            Path: /fleet-providers/{providerId}
            Method: GET
        UpdateProvider:
          Type: HttpApi
          Properties:
            ApiId: !Ref AdminApi
            Path: /fleet-providers/{providerId}
            Method: PATCH
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - apps/kamel-admin/src/main.ts
        Target: es2022
        Sourcemap: true

  ServiceCentresHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub kamel-admin-service-centres-${Environment}
      Description: Admin service centre management API
      Environment:
        Variables:
          HANDLER_NAME: service-centres-handler
          ALLOWED_GROUPS: admin
      Events:
        CreateServiceCentre:
          Type: HttpApi
          Properties:
            ApiId: !Ref AdminApi
            Path: /service-centres
            Method: POST
        ListServiceCentres:
          Type: HttpApi
          Properties:
            ApiId: !Ref AdminApi
            Path: /service-centres
            Method: GET
        GetServiceCentre:
          Type: HttpApi
          Properties:
            ApiId: !Ref AdminApi
            Path: /service-centres/{serviceCentreId}
            Method: GET
        UpdateServiceCentre:
          Type: HttpApi
          Properties:
            ApiId: !Ref AdminApi
            Path: /service-centres/{serviceCentreId}
            Method: PATCH
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - apps/kamel-admin/src/main.ts
        Target: es2022
        Sourcemap: true

  DashboardHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub kamel-admin-dashboard-${Environment}
      Description: Admin dashboard read model API
      Environment:
        Variables:
          HANDLER_NAME: dashboard-handler
          ALLOWED_GROUPS: admin
      Events:
        GetDashboardBike:
          Type: HttpApi
          Properties:
            ApiId: !Ref AdminApi
            Path: /dashboard/bikes/{bikeId}
            Method: GET
        GetDashboardBikeTimeline:
          Type: HttpApi
          Properties:
            ApiId: !Ref AdminApi
            Path: /dashboard/bikes/{bikeId}/timeline
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - apps/kamel-admin/src/main.ts
        Target: es2022
        Sourcemap: true

Outputs:
  AdminApiId:
    Value: !Ref AdminApi
    Export:
      Name: !Sub KamelAdminApiId-${Environment}

  AdminApiUrl:
    Value: !Sub https://${AdminApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/${Environment}
    Export:
      Name: !Sub KamelAdminApiUrl-${Environment}
